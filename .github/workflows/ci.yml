name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Build
        run: go build ./cmd/cheatmd

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo "gofmt needed on above files" && exit 1)

      - name: Lint cheats
        run: go run ./cmd/cheatmd --lint examples/
